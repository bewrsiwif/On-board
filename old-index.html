<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>長青關懷報到查詢台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { background: #f5f5f5; }
    .container { margin-top: 40px; max-width: 800px; }
    .card-panel { padding: 20px 30px; }
    .title { text-align: center; margin-bottom: 40px; }
    .btn-custom { width: 100%; background-color: #2196f3; }
    #output img { margin-top: 10px; }
    .success-box {
      padding: 20px;
      text-align: center;
      background: #e8f5e9;
      border-left: 6px solid #4caf50;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container z-depth-1 white card-panel">
    <h4 class="title teal-text text-darken-3">
      <i class="material-icons">search</i> 長青關懷報到查詢台
    </h4>
    <p class="center-align grey-text text-darken-1">請輸入姓名與電話，或使用手機相機掃描</p>

    <form onsubmit="submitQuery(); return false;">
      <div class="row">
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">account_circle</i>
          <input type="text" id="myName" name="myName">
          <label for="myName">姓名</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">phone</i>
          <input type="text" id="myPhone" name="myPhone">
          <label for="myPhone">電話</label>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m6">
          <button type="submit" class="btn btn-custom waves-effect waves-light">
            查詢
          </button>
        </div>
        <div class="col s12 m6">
          <button type="button" class="btn grey darken-2 waves-effect waves-light" onclick="startScan();">
            <i class="material-icons left">qr_code_scanner</i> 掃描 QR / 條碼
          </button>
        </div>
      </div>
    </form>

    <div id="preload" style="display:none;">
      <div class="progress"><div class="indeterminate"></div></div>
    </div>

    <div id="reader" style="width:300px; margin:auto; display:none;"></div>
    <div id="output" class="section"></div>
  </div>

  <script>
    let qrScanner;
    let scanned = false;

    function submitQuery() {
      $('#preload').show();
      $('#output').html("");

      const formData = {
        myName: document.getElementById("myName").value,
        myPhone: document.getElementById("myPhone").value
      };

      google.script.run.withSuccessHandler(showQRcode).queryByName(formData);
    }

    function showQRcode(result) {
      $('#preload').hide();
      $('#output').html(result);
    }

    function startScan() {
      document.getElementById("reader").style.display = "block";
      scanned = false;

      if (!qrScanner) {
        qrScanner = new Html5Qrcode("reader");
      }

      qrScanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: 250,
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A
          ]
        },
        qrCodeMessage => {
          if (scanned) return;
          scanned = true;

          qrScanner.stop().then(() => {
            document.getElementById("reader").style.display = "none";
            document.getElementById("myPhone").value = qrCodeMessage;
            submitQuery();
          }).catch(err => console.error("停止掃描器錯誤：", err));
        },
        errorMessage => {
          // 可忽略錯誤訊息
        }
      ).catch(err => alert("相機開啟失敗：" + err));
    }

    function submitToSheet(btn, sn) {
      console.log("Submitting with sn:", sn);
      btn.disabled = true;
      btn.textContent = "提交中...";

      google.script.run.withSuccessHandler(function(res) {
        if (res.status === "success") {
          btn.textContent = "已報到";
          // We can also change the color to grey
          btn.classList.remove("green");
          btn.classList.add("grey");
          
          $('#output').html(`
            <div class="card-panel green lighten-4">
              <h5 class="green-text text-darken-2">✅ 報到成功</h5>
              <p>姓名：<strong>${res.name}</strong></p>
              <p>報到日期：<strong>${res.time}</strong></p>
            </div>
          `);
        } else {
          M.toast({ html: res.message, classes: 'orange' });
          btn.disabled = false;
          btn.textContent = "提交報到";
        }
      }).recordQRCode(sn);
    }
  </script>
</body>
</html>

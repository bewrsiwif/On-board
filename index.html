<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>2025增上佛七報到系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
  <!-- 引入 QRCode.js 不再依賴外部 API -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { background: #f5f5f5; padding-top: 20px; }
    .container { max-width: 600px; }
    #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #2196f3; background: white; border-radius: 8px; overflow: hidden; }
    #preload { display:none; text-align:center; padding: 20px; }
    .qrcode-box { display: flex; justify-content: center; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card-panel z-depth-2">
      <h5 class="center-align blue-text">學員報到系統 (男眾拜墊)</h5>
      
      <div id="scanControl" class="center-align" style="margin: 20px 0;">
        <button class="btn-large blue waves-effect" onclick="startScan();" style="width:100%;">
          <i class="material-icons left">camera_alt</i> 啟動相機掃描
        </button>
      </div>

      <div id="reader" style="display:none;"></div>
      
      <div id="preload">
        <div class="progress"><div class="indeterminate"></div></div>
      </div>

      <div id="output"></div>

      <hr style="margin: 30px 0;">

      <p class="center-align grey-text">或使用手動輸入</p>
      <div class="row">
        <div class="input-field col s12 m6"><input type="text" id="myName"><label for="myName">姓名</label></div>
        <div class="input-field col s12 m6"><input type="text" id="mySN"><label for="mySN">序號</label></div>
      </div>
      <button class="btn btn-block grey" onclick="submitQuery();" style="width:100%;">手動查詢</button>
    </div>
  </div>

  <script>
    // [重要] 請將此處替換為您的 GAS 部署網址 (/exec 結尾)
    const GAS_URL = "https://script.google.com/macros/s/AKfycby5zzTaQZNRv3vdg5o4Qx8Btgk9dy0EBYqoswcMY4gjyKf3U2SuTGmR0oFdENjIJeohLA/exec"; 

    let qrScanner;
    let isProcessing = false;

    function startScan() {
      document.getElementById("reader").style.display = "block";
      document.getElementById("output").innerHTML = "";
      if (!qrScanner) qrScanner = new Html5Qrcode("reader");

      qrScanner.start(
        { facingMode: "environment" },
        { fps: 25, qrbox: 280, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
        msg => {
          if (isProcessing) return;
          isProcessing = true;
          if (navigator.vibrate) navigator.vibrate(100);
          qrScanner.stop().then(() => {
            document.getElementById("reader").style.display = "none";
            sendData("checkin", { qrValue: msg });
          });
        }
      ).catch(err => alert("相機啟動失敗：" + err));
    }

    function submitQuery() {
      const data = { myName: document.getElementById("myName").value, mySN: document.getElementById("mySN").value };
      sendData("query", data);
    }

    function sendData(action, params) {
      $('#preload').show();
      $('#output').html("");
      
      // 加入隨機數防止瀏覽器快取 (Cache)
      let queryStr = `action=${action}&t=${new Date().getTime()}`;
      for (let key in params) queryStr += `&${key}=${encodeURIComponent(params[key])}`;

      const finalUrl = `${GAS_URL}?${queryStr}`;

      fetch(finalUrl, {
        method: 'GET',
        mode: 'no-cors', // 嘗試使用 no-cors 模式繞過部分限制 (僅限發送資料)
      }).then(() => {
        // 因為 no-cors 無法取得回傳值，所以我們還是得用 cors
        return fetch(finalUrl);
      })
        .then(res => {
          if (!res.ok) throw new Error("HTTP 狀態碼：" + res.status);
          return res.json();
        })
        .then(res => {
          $('#preload').hide();
          isProcessing = false;
          if (action === "checkin") renderCheckinResult(res);
          else renderQueryResult(res);
        })
        .catch(err => {
          $('#preload').hide();
          isProcessing = false;
          let errMsg = err.toString();
          if (errMsg.includes("TypeError") || errMsg.includes("Load failed")) {
            errMsg = "連線被拒絕。請檢查您的 GAS 是否設定為「所有人 (Anyone)」可存取，並務必「部署為新版本」。";
          }
          $('#output').html(`
            <div class='card-panel red lighten-4 red-text center'>
              <b>連線錯誤</b><br>
              <small>${errMsg}</small><br><br>
              <a href="${finalUrl}" target="_blank" class="btn-small red">點此測試後端連結</a>
            </div>`);
        });
    }

    function renderQueryResult(res) {
      if (res.status === "error") {
        $('#output').html(`<div class='card-panel red lighten-4 red-text center'><b>${res.message}</b></div>`);
        return;
      }
      let html = "<h6>找到以下學員：</h6>";
      res.data.forEach((s, index) => {
        html += `
        <div class="card white">
          <div class="card-content" style="padding: 15px;">
            <span class="card-title blue-text" style="font-weight:bold; font-size: 1.4rem;">${s.name} <small class="grey-text">(${s.sn})</small></span>
            <div class="divider" style="margin: 10px 0;"></div>
            <div class="row" style="margin-bottom:0;">
              <div class="col s6"><p class="grey-text">床號</p><h5 style="margin:0; font-weight:bold;">${s.floor}-${s.bed}</h5></div>
              <div class="col s6"><p class="grey-text">班級</p><p style="margin:0;">${s.school}</p></div>
            </div>
          </div>
          <div class="card-action center-align">
            <div class="qrcode-box" id="qrcode_${index}"></div>
            <button class="btn green waves-effect waves-light" style="width:100%; margin-top:10px;" onclick="sendData('checkin', {qrValue:'${s.sn}'})">
              <i class="material-icons left">check_circle</i> 執行報到
            </button>
          </div>
        </div>`;
        
        setTimeout(() => {
          new QRCode(document.getElementById(`qrcode_${index}`), {
            text: s.sn,
            width: 128,
            height: 128
          });
        }, 100);
      });
      $('#output').html(html);
    }

    function renderCheckinResult(res) {
      if (res.status === "error") {
        $('#output').html(`
          <div class='card-panel red lighten-4 center'>
            <i class="material-icons large red-text">error_outline</i>
            <h5 class="red-text">報到失敗</h5>
            <p>${res.message}</p>
          </div>`);
        return;
      }
      const d = res.details;
      $('#output').html(`
        <div class="card-panel center-align z-depth-3" style="border: 2px solid #4caf50; border-radius: 15px; background: #e8f5e9;">
          <i class="material-icons large green-text">verified</i>
          <h4 class="green-text" style="font-weight:bold; margin-top:0;">報到成功</h4>
          <div class="divider"></div>
          <div style="padding: 20px 0;">
            <h5 style="margin: 5px 0;">${d.name} <small>(${d.sn})</small></h5>
            <div style="margin: 20px 0;">
              <p class="grey-text" style="margin:0;">分配床位</p>
              <h2 style="margin:0; color:#2e7d32; font-weight:bold;">${d.floor} 樓 ${d.bed} 號</h2>
            </div>
          </div>
          <p class="grey-text">時間: ${res.time}</p>
        </div>`);
    }
  </script>
</body>
</html>
